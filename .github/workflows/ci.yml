name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_COLOR: 1

jobs:
  quality:
    name: Quality and unit tests
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run test:coverage
      - run: npm run test:timezones
      - run: npm run benchmark:planner
      - run: npm run build
      - run: npm run extension:check
      - run: npm pack --dry-run -w @neo-anki/extension-sdk
      - run: npm audit --audit-level=high
      - run: npm run license:check
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: coverage
          path: coverage/
          if-no-files-found: ignore
          retention-days: 14

  browser:
    name: Browser journeys
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium webkit
      - run: npm run test:e2e
      - uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: browser-test-results
          path: test-results/
          retention-days: 14

  desktop:
    name: Desktop — ${{ matrix.name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux x64
            os: ubuntu-24.04
            command: xvfb-run --auto-servernum npm run test:desktop
          - name: Windows x64
            os: windows-2025
            command: npm run test:desktop
          - name: macOS arm64
            os: macos-15
            command: npm run test:desktop
          - name: macOS x64
            os: macos-15-intel
            command: npm run test:desktop
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npx playwright install chromium
      - run: ${{ matrix.command }}
      - uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: desktop-test-results-${{ matrix.name }}
          path: test-results/
          retention-days: 14
