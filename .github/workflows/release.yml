name: Releases

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write
  id-token: write
  attestations: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  NEO_ANKI_EXTENSION_SOURCE_COMMIT: ${{ github.sha }}
  NEO_ANKI_EXTENSION_CORE_COMMIT: ${{ github.sha }}

jobs:
  verify:
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    env:
      ANKI_ORACLE_PYTHON: python3
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: npm
      - uses: actions/setup-python@v6
        with:
          python-version: '3.13'
      - run: python3 -m pip install anki==25.9.4
      - run: npm ci
      - run: node scripts/fetch-interoperability-test-extension.mjs
      - run: npm run lint && npm run typecheck && npm run test:coverage && npm run test:timezones && npm run benchmark:planner && npm run license:check && npm run build && npm run extension:check && npm run mobile:export
      - run: npx playwright install --with-deps chromium firefox webkit
      - run: npm run test:e2e
      - run: xvfb-run --auto-servernum npm run test:desktop
      - name: Verify tag matches package version
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: |
          test "${GITHUB_REF_NAME}" = "v$(node -p "require('./package.json').version")"
          test -f "docs/releases/${GITHUB_REF_NAME}.md"

  build:
    needs: verify
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macos-universal
            os: macos-15
            args: --mac --universal
          - name: windows-x64
            os: windows-2025
            args: --win --x64
          - name: linux-x64
            os: ubuntu-24.04
            args: --linux --x64
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run release:policy
      - run: npm run build && npm run extension:example && npm run desktop:prepare
      - name: Build signed and notarized macOS release artifacts
        if: runner.os == 'macOS'
        env:
          CSC_LINK: ${{ secrets.MACOS_CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.MACOS_CSC_KEY_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: npx electron-builder ${{ matrix.args }} --publish never
      - name: Build release artifacts
        if: runner.os != 'macOS'
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
        run: npx electron-builder ${{ matrix.args }} --publish never
      - name: Verify macOS payload and launch
        if: runner.os == 'macOS'
        shell: bash
        run: |
          app_path="$(find release -maxdepth 3 -type d -name '*.app' -print -quit)"
          test -n "$app_path"
          executable="$app_path/Contents/MacOS/Neo Anki"
          test -x "$executable"
          codesign --verify --deep --strict --verbose=2 "$app_path"
          codesign -dv --verbose=4 "$app_path" 2>&1 | grep -F 'Authority=Developer ID Application:'
          xcrun stapler validate "$app_path"
          spctl --assess --type execute --verbose=2 "$app_path"
          NEO_ANKI_RELEASE_APP="$executable" npm run test:acceptance:release -- --grep 'clean core journey'
      - name: Verify Windows payload and launch
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $installer = Get-ChildItem release -Filter *.exe | Select-Object -First 1
          if (-not $installer) { throw 'No Windows installer was produced.' }
          $executable = Get-ChildItem release/win-unpacked -Filter *.exe | Select-Object -First 1
          if (-not $executable) { throw 'No packaged Windows executable was produced.' }
          $env:NEO_ANKI_RELEASE_APP = $executable.FullName
          npm run test:acceptance:release -- --grep 'clean core journey'
      - name: Verify Linux AppImage payload and launch
        if: runner.os == 'Linux'
        shell: bash
        run: |
          appimage="$(find release -maxdepth 1 -name '*.AppImage' -print -quit)"
          test -n "$appimage"
          chmod +x "$appimage"
          "$appimage" --appimage-extract >/dev/null
          test -x squashfs-root/AppRun
          test -d squashfs-root/usr
          executable="$(find release/linux-unpacked -maxdepth 1 -type f -name 'neo-anki' -print -quit)"
          test -x "$executable"
          NEO_ANKI_RELEASE_APP="$executable" xvfb-run --auto-servernum npm run test:acceptance:release -- --grep 'clean core journey'
      - name: Stage distributable files and installation guidance
        run: node scripts/prepare-release-artifacts.mjs "${{ matrix.name }}"
      - name: Create CycloneDX SBOM
        shell: bash
        run: npm sbom --sbom-format cyclonedx > "release-artifacts/${{ matrix.name }}/neo-anki-${{ matrix.name }}.cdx.json"
      - name: Create deterministic checksums
        run: node scripts/write-checksums.mjs "release-artifacts/${{ matrix.name }}" "SHA256SUMS-${{ matrix.name }}.txt"
      - uses: actions/attest-build-provenance@v4
        with:
          subject-path: 'release-artifacts/${{ matrix.name }}/*'
      - uses: actions/upload-artifact@v7
        with:
          name: neo-anki-${{ matrix.name }}
          path: release-artifacts/${{ matrix.name }}/*
          if-no-files-found: error
          retention-days: 30

  publish:
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v7
      - uses: actions/download-artifact@v8
        with:
          pattern: neo-anki-*
          path: artifacts
          merge-multiple: true
      - uses: softprops/action-gh-release@v3
        with:
          name: Neo Anki ${{ github.ref_name }}
          draft: true
          body_path: docs/releases/${{ github.ref_name }}.md
          files: artifacts/*
      - name: Verify uploaded draft assets
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          mkdir uploaded-release
          gh release download "${GITHUB_REF_NAME}" --repo "$GITHUB_REPOSITORY" --dir uploaded-release
          cd uploaded-release
          test "$(find . -maxdepth 1 -type f | wc -l | tr -d ' ')" = 16
          for manifest in SHA256SUMS-*.txt; do shasum -a 256 -c "$manifest"; done
          for sbom in *.cdx.json; do jq -e '.bomFormat == "CycloneDX" and (.components | length > 0)' "$sbom" >/dev/null; done
          for evidence in RELEASE-EVIDENCE-*.json; do jq -e '.commit == env.GITHUB_SHA and .version == env.GITHUB_REF_NAME' "$evidence" >/dev/null; done
          for artifact in *.AppImage *.dmg *.zip *.exe; do gh attestation verify "$artifact" --repo "$GITHUB_REPOSITORY" >/dev/null; done
