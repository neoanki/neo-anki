name: Release candidates

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write
  id-token: write
  attestations: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  verify:
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run lint && npm run typecheck && npm run test:coverage && npm run build
      - name: Verify tag matches package version
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: test "${GITHUB_REF_NAME}" = "v$(node -p "require('./package.json').version")"

  build:
    needs: verify
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macos-universal
            os: macos-15
            args: --mac --universal
          - name: windows-x64
            os: windows-2025
            args: --win --x64
          - name: linux-x64
            os: ubuntu-24.04
            args: --linux --x64
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    env:
      CSC_LINK: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
      CSC_KEY_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      WIN_CSC_LINK: ${{ secrets.WINDOWS_CERTIFICATE_BASE64 }}
      WIN_CSC_KEY_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run build && npm run extension:example && npm run desktop:prepare
      - name: Build signed release artifacts
        run: npx electron-builder ${{ matrix.args }} --publish never -c.forceCodeSigning=true
      - name: Verify macOS signature, notarization, and staple
        if: runner.os == 'macOS'
        shell: bash
        run: |
          app_path="$(find release -maxdepth 3 -type d -name '*.app' -print -quit)"
          test -n "$app_path"
          codesign --verify --deep --strict --verbose=2 "$app_path"
          spctl --assess --verbose --type exec "$app_path"
          xcrun stapler validate "$app_path"
      - name: Verify Windows Authenticode signature
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $installer = Get-ChildItem release -Filter *.exe | Select-Object -First 1
          if (-not $installer) { throw 'No Windows installer was produced.' }
          $signature = Get-AuthenticodeSignature $installer.FullName
          if ($signature.Status -ne 'Valid') { throw "Invalid Authenticode signature: $($signature.Status)" }
      - name: Verify Linux AppImage payload
        if: runner.os == 'Linux'
        shell: bash
        run: |
          appimage="$(find release -maxdepth 1 -name '*.AppImage' -print -quit)"
          test -n "$appimage"
          chmod +x "$appimage"
          "$appimage" --appimage-extract >/dev/null
          test -x squashfs-root/AppRun
          test -d squashfs-root/usr
      - name: Create checksums
        shell: bash
        run: |
          cd release
          find . -maxdepth 1 -type f -print0 | sort -z | xargs -0 shasum -a 256 > SHA256SUMS.txt
      - name: Create CycloneDX SBOM
        shell: bash
        run: npm sbom --sbom-format cyclonedx > "release/neo-anki-${{ matrix.name }}.cdx.json"
      - uses: actions/attest-build-provenance@v4
        with:
          subject-path: 'release/*'
      - uses: actions/upload-artifact@v7
        with:
          name: neo-anki-${{ matrix.name }}
          path: release/*
          if-no-files-found: error
          retention-days: 30

  publish:
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/download-artifact@v8
        with:
          pattern: neo-anki-*
          path: artifacts
          merge-multiple: true
      - uses: softprops/action-gh-release@v3
        with:
          draft: true
          generate_release_notes: true
          files: artifacts/*
