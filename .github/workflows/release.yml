name: Community releases

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write
  id-token: write
  attestations: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  verify:
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run lint && npm run typecheck && npm run test:coverage && npm run test:timezones && npm run benchmark:planner && npm run license:check && npm run build && npm run extension:check
      - name: Verify tag matches package version
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: test "${GITHUB_REF_NAME}" = "v$(node -p "require('./package.json').version")"

  build:
    needs: verify
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macos-universal
            os: macos-15
            args: --mac --universal
          - name: windows-x64
            os: windows-2025
            args: --win --x64
          - name: linux-x64
            os: ubuntu-24.04
            args: --linux --x64
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    env:
      CSC_IDENTITY_AUTO_DISCOVERY: 'false'
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run build && npm run extension:example && npm run desktop:prepare
      - name: Build no-cost community artifacts
        run: npx electron-builder ${{ matrix.args }} --publish never
      - name: Verify expected macOS trust state and launch
        if: runner.os == 'macOS'
        shell: bash
        run: |
          app_path="$(find release -maxdepth 3 -type d -name '*.app' -print -quit)"
          test -n "$app_path"
          if codesign -dv --verbose=4 "$app_path" 2>&1 | grep -q 'Authority=Developer ID'; then
            echo 'Community macOS builds must not claim an unavailable Developer ID identity.'
            exit 1
          fi
          if spctl --assess --type exec "$app_path"; then
            echo 'Community macOS builds are expected to require the documented Open Anyway flow.'
            exit 1
          fi
          executable="$app_path/Contents/MacOS/Neo Anki"
          test -x "$executable"
          NEO_ANKI_PACKAGED_APP="$executable" npx playwright test --config=playwright.desktop.config.ts --grep 'packaged application launches'
      - name: Verify expected Windows trust state and launch
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $installer = Get-ChildItem release -Filter *.exe | Select-Object -First 1
          if (-not $installer) { throw 'No Windows installer was produced.' }
          $signature = Get-AuthenticodeSignature $installer.FullName
          if ($signature.Status -ne 'NotSigned') { throw "Expected an unsigned community installer, got: $($signature.Status)" }
          $executable = Get-ChildItem release/win-unpacked -Filter *.exe | Select-Object -First 1
          if (-not $executable) { throw 'No packaged Windows executable was produced.' }
          $env:NEO_ANKI_PACKAGED_APP = $executable.FullName
          npx playwright test --config=playwright.desktop.config.ts --grep 'packaged application launches'
      - name: Verify Linux AppImage payload and launch
        if: runner.os == 'Linux'
        shell: bash
        run: |
          appimage="$(find release -maxdepth 1 -name '*.AppImage' -print -quit)"
          test -n "$appimage"
          chmod +x "$appimage"
          "$appimage" --appimage-extract >/dev/null
          test -x squashfs-root/AppRun
          test -d squashfs-root/usr
          executable="$(find release/linux-unpacked -maxdepth 1 -type f -name 'neo-anki' -print -quit)"
          test -x "$executable"
          NEO_ANKI_PACKAGED_APP="$executable" xvfb-run --auto-servernum npx playwright test --config=playwright.desktop.config.ts --grep 'packaged application launches'
      - name: Stage distributable files and installation guidance
        run: node scripts/prepare-release-artifacts.mjs "${{ matrix.name }}"
      - name: Create CycloneDX SBOM
        shell: bash
        run: npm sbom --sbom-format cyclonedx > "release-artifacts/${{ matrix.name }}/neo-anki-${{ matrix.name }}.cdx.json"
      - name: Create deterministic checksums
        run: node scripts/write-checksums.mjs "release-artifacts/${{ matrix.name }}" "SHA256SUMS-${{ matrix.name }}.txt"
      - uses: actions/attest-build-provenance@v4
        with:
          subject-path: 'release-artifacts/${{ matrix.name }}/*'
      - uses: actions/upload-artifact@v7
        with:
          name: neo-anki-${{ matrix.name }}
          path: release-artifacts/${{ matrix.name }}/*
          if-no-files-found: error
          retention-days: 30

  publish:
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/download-artifact@v8
        with:
          pattern: neo-anki-*
          path: artifacts
          merge-multiple: true
      - uses: softprops/action-gh-release@v3
        with:
          draft: true
          generate_release_notes: true
          files: artifacts/*
      - name: Verify uploaded draft assets
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          mkdir uploaded-release
          gh release download "${GITHUB_REF_NAME}" --repo "$GITHUB_REPOSITORY" --dir uploaded-release
          cd uploaded-release
          test "$(find . -maxdepth 1 -type f | wc -l | tr -d ' ')" = 13
          for manifest in SHA256SUMS-*.txt; do shasum -a 256 -c "$manifest"; done
          for sbom in *.cdx.json; do jq -e '.bomFormat == "CycloneDX" and (.components | length > 0)' "$sbom" >/dev/null; done
          for artifact in *.AppImage *.dmg *.zip *.exe; do gh attestation verify "$artifact" --repo "$GITHUB_REPOSITORY" >/dev/null; done
